workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 120
    environment:
      groups:
        - app_store_credentials
      node: v20
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/ABCandMe.xcworkspace"
        XCODE_SCHEME: "ABCandMe"
        BUNDLE_ID: "com.jmagdziasz.abcfamily"
    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing certificate and provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Install npm dependencies
        script: npm ci

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
